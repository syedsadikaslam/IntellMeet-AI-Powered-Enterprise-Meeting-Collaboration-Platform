services:
  - type: web
    name: intellmeet-backend
    env: docker
    dockerContext: server
    dockerfilePath: Dockerfile
    plan: free # Change to starter/pro for production scale
    region: ohio # Change to your preferred region
    envVars:
      - key: MONGO_URI
        sync: false # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false # Set manually in Render dashboard
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false # Set to your Vercel URL
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
